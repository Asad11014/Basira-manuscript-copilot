# Basira local infrastructure.
#
# Per the spec (§0), the app runs from `docker compose up` + `pnpm dev`.
# This compose file brings up the *infrastructure* (Postgres, Redis, MinIO);
# the API and web app run on the host via `pnpm dev` for fast hot-reload.
#
# The `app` profile (api + web containers) is a post-MVP seam — enable with
# `docker compose --profile app up` once Dockerfiles are added under apps/*.

name: basira

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: basira
      POSTGRES_PASSWORD: basira
      POSTGRES_DB: basira
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U basira -d basira']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # Kraken HTR sidecar (free, open-source transcription). Opt-in via the
  # `kraken` profile so it isn't built on a plain `docker compose up`:
  #   docker compose --profile kraken up -d kraken
  kraken:
    profiles: ['kraken']
    build: ./docker/kraken
    restart: unless-stopped
    ports:
      - '8500:8500'
    environment:
      KRAKEN_MODEL: /models/recognition.mlmodel
      KRAKEN_MODEL_NAME: ${KRAKEN_MODEL_NAME:-kraken-openiti-arabic}
      KRAKEN_MODEL_VERSION: ${KRAKEN_MODEL_VERSION:-OpenITI printed Arabic / 10.5281/zenodo.7050270}
      KRAKEN_MODEL_DOI: ${KRAKEN_MODEL_DOI:-}
      # box (light, printed/clean) | baseline (neural, handwriting — needs ~6-8GB Docker)
      KRAKEN_SEG_MODE: ${KRAKEN_SEG_MODE:-box}
      KRAKEN_BASE_DIR: ${KRAKEN_BASE_DIR:-R}
    volumes:
      - kraken-models:/models

  # One-shot: create the bucket on first boot so the app has somewhere to write.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/basira;
      mc anonymous set download local/basira;
      exit 0;
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
  kraken-models:
